<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradeCalc — Leveraged Trading Simulator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">TRADE<span class="logo-accent">CALC</span></span>
    </div>
    <div class="header-tag">Leveraged Outcome Simulator</div>
  </header>

  <main class="main-content">
    <div class="calculator-card" id="calculatorCard">

      <!-- ── INPUT VIEW ── -->
      <div class="view" id="inputView">
        <div class="card-header">
          <div class="card-title-group">
            <h1 class="card-title">Position Calculator</h1>
            <p class="card-subtitle">Simulate leveraged trade outcomes before you execute.</p>
          </div>
          <div class="mode-selector-wrap">
            <label class="field-label" for="tradingMode">Trading Mode</label>
            <div class="select-wrapper">
              <select id="tradingMode" class="select-field">
                <option value="5">Intraday Trading — 5× Margin</option>
                <option value="3.4">MFT / Swing Trading — 3.4× Margin</option>
              </select>
              <span class="select-arrow">▾</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="input-grid">
          <div class="input-group">
            <label class="field-label" for="capital">Capital</label>
            <div class="input-wrapper">
              <span class="input-prefix">₹</span>
              <input type="number" id="capital" class="input-field" placeholder="50,000" min="0"/>
            </div>
          </div>

          <div class="input-group">
            <label class="field-label" for="gainPct">Expected Gain %</label>
            <div class="input-wrapper">
              <input type="number" id="gainPct" class="input-field" placeholder="2.0" min="0" step="0.1"/>
              <span class="input-suffix">%</span>
            </div>
          </div>

          <div class="input-group">
            <label class="field-label" for="slPct">Stop Loss %</label>
            <div class="input-wrapper">
              <input type="number" id="slPct" class="input-field" placeholder="1.0" min="0" step="0.1"/>
              <span class="input-suffix">%</span>
            </div>
          </div>
        </div>

        <p class="error-msg" id="errorMsg"></p>

        <button class="btn-primary" id="calcBtn" onclick="calculate()">
          <span class="btn-label">Calculate Outcomes</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <!-- ── RESULTS VIEW ── -->
      <div class="view hidden" id="resultsView">

        <div class="results-header">
          <div>
            <h2 class="results-title">Trade Simulation</h2>
            <p class="results-meta" id="resultsMeta"></p>
          </div>
          <button class="btn-ghost" onclick="recalculate()">← Recalculate</button>
        </div>

        <div class="divider"></div>

        <!-- Trade Size Banner -->
        <div class="trade-size-banner">
          <span class="ts-label">Total Trade Size</span>
          <span class="ts-value" id="tradeSizeDisplay"></span>
          <span class="ts-note" id="marginNote"></span>
        </div>

        <!-- Profit Scenarios -->
        <section class="results-section">
          <div class="section-label">
            <span class="section-dot gain"></span>
            Profit Scenarios
          </div>
          <div class="scenario-grid" id="profitScenarios"></div>
        </section>

        <!-- Loss Scenario -->
        <section class="results-section">
          <div class="section-label">
            <span class="section-dot loss"></span>
            Stop Loss Hit
          </div>
          <div class="loss-card" id="lossCard"></div>
        </section>

        <!-- Capital Impact -->
        <section class="results-section">
          <div class="section-label">
            <span class="section-dot neutral"></span>
            Capital Impact
          </div>
          <div class="capital-grid" id="capitalGrid"></div>
        </section>

        <div class="risk-bar-wrap">
          <div class="risk-bar-labels">
            <span>Risk/Reward (Base)</span>
            <span id="rrRatio"></span>
          </div>
          <div class="risk-bar-track">
            <div class="risk-bar-fill gain" id="rewardBar"></div>
            <div class="risk-bar-fill loss" id="riskBar"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>For educational &amp; simulation purposes only. Not financial advice.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
